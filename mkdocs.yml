site_name: INTERCEPT
site_description: >-
  A research-grade, reproducible benchmark comparing classical, optimal, game-theoretic, and learned
  missile-interception guidance on identical engagements (simulation-only, educational/research).
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Results digest: results.md
  - Benchmark methodology: benchmarks/methodology.md
  - Algorithms:
      - Proportional Navigation: algorithms/proportional-navigation.md
      - Optimal & MPC: algorithms/optimal-mpc-guidance.md
      - Estimation & tracking: algorithms/estimation-tracking.md
      - Game theory: algorithms/game-theory.md
      - Realistic engagements: algorithms/realistic-engagements.md
      - RL guidance: algorithms/rl-guidance.md
