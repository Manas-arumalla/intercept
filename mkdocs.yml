      - ADR-0023 Population self-play: adr/0023-population-self-play.md
      - ADR-0024 RL on estimated observations: adr/0024-rl-trained-on-estimated-observations.md
      - ADR-0025 INTERCEPT League (Elo): adr/0025-intercept-league-elo.md
