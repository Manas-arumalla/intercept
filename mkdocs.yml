site_name: INTERCEPT
site_description: >-
  A research-grade, reproducible benchmark comparing classical, optimal, game-theoretic, and learned
  missile-interception guidance on identical engagements (simulation-only, educational/research).
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Results digest: results.md
  - Scope & limitations: limitations.md
  - Benchmark methodology: benchmarks/methodology.md
  - Algorithms:
      - Proportional Navigation: algorithms/proportional-navigation.md
      - Optimal & MPC: algorithms/optimal-mpc-guidance.md
      - Estimation & tracking: algorithms/estimation-tracking.md
      - Game theory: algorithms/game-theory.md
      - Realistic engagements: algorithms/realistic-engagements.md
      - RL guidance: algorithms/rl-guidance.md
  - Decisions (ADRs):
      - Index: adr/README.md
      - ADR-0001 Python-primary stack: adr/0001-python-primary-stack.md
      - ADR-0002 Point-mass-first fidelity: adr/0002-point-mass-first-fidelity.md
      - ADR-0003 Benchmark fairness invariants: adr/0003-benchmark-fairness-invariants.md
      - ADR-0004 Sensor/estimator interface: adr/0004-sensor-estimator-interface.md
      - ADR-0005 RL env contract: adr/0005-rl-env-contract.md
      - ADR-0006 Realistic fidelity (L2): adr/0006-realistic-fidelity-l2.md
      - ADR-0007 3-D extension: adr/0007-three-dimensional-extension.md
      - ADR-0008 Realistic aero/propulsion (L3): adr/0008-realistic-aero-propulsion-l3.md
      - ADR-0009 Multi-agent / swarm: adr/0009-multiagent-swarm.md
      - ADR-0010 Realistic speed parity: adr/0010-realistic-speed-parity-no-cheat.md
      - ADR-0011 Residual RL guidance: adr/0011-residual-rl-guidance.md
      - ADR-0012 3-D benchmark: adr/0012-three-dimensional-benchmark.md
      - ADR-0013 3-D estimation: adr/0013-three-dimensional-estimation.md
      - ADR-0014 3-D RL guidance: adr/0014-three-dimensional-rl.md
      - ADR-0015 Adversarial-RL evader: adr/0015-adversarial-rl-evader.md
      - ADR-0016 Impact-time salvo guidance: adr/0016-impact-time-salvo-guidance.md
