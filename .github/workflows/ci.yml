name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check intercept tests
      - name: Type check (mypy)
        run: mypy intercept
        continue-on-error: true
      - name: Tests
        run: pytest --cov=intercept --cov-report=term-missing
      - name: Smoke benchmark (P0 demo runs headless)
        env:
          MPLBACKEND: Agg
        run: python experiments/p0_first_engagement.py --no-show

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build docs site (mkdocs)
        run: mkdocs build
